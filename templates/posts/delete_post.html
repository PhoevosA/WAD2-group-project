{% extends "base.html" %}

{% block content %}
<div class="post-delete-container">
    <div class="card">
        <h2>Delete Post</h2>

        <p>Are you sure you want to delete this post?</p><br/>

        <p><strong>{{ post.description }}</strong></p>

        {% if post.image %}
            <img src="{{ post.image.url }}" width="300">
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn post-delete-btn">Delete</button>
        </form>

        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline">Cancel</a>
    </div>
</div>
{% endblock %}
