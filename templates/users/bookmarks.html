{% extends 'base.html' %}
{% block title %}Bookmarks — travelshare{% endblock %}
{% block content %}
<div class="bookmarks-page">

  <h2 class="page-title">Bookmarks</h2>

  <div class="profile-posts-grid">
    {% for bookmark in bookmarks %}
      <a href="{% url 'post_detail' bookmark.post.pk %}" class="grid-item">
        <img src="{{ bookmark.post.image.url }}" alt="Post" loading="lazy">
        <div class="grid-overlay">
          <span>
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            {{ bookmark.post.get_likes_count }}
          </span>
          <span>
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            {{ bookmark.post.get_comments_count }}
          </span>
        </div>
      </a>
    {% empty %}
      <div class="empty-section">
        <p>No bookmarks yet.</p>
        <a href="{% url 'explore' %}" class="btn btn-primary">Explore</a>
      </div>
    {% endfor %}
  </div>

</div>
{% endblock %}
